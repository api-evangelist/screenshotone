aid: screenshotone
name: ScreenshotOne
description: >-
  ScreenshotOne is a screenshot API for developers that provides fast and
  reliable website screenshot rendering. The API supports GET and POST requests
  over HTTPS and enables capture of screenshots in PNG, JPEG, WebP, GIF and
  other formats with customizable rendering options including screen size,
  dark mode, ad blocking, and metadata extraction.
